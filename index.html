<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mind Map Editor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mind-elixir/dist/style.css">
  <script src="https://cdn.jsdelivr.net/npm/mind-elixir"></script>
  <style>
    #map { width: 100vw; height: 100vh; }
    .controls { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="controls">
    <button onclick="saveData()">Сохранить</button>
  </div>

  <script>
    // Начальные данные (пустая центральная тема)
    const initialData = {
      nodeData: {
        id: 'root',
        topic: 'Центральная тема',
        root: true,
        children: []
      }
    };

    const mind = new MindElixir({
      el: '#map',
      direction: MindElixir.SIDE,
      data: initialData,
      draggable: true,
      contextMenu: true, // Включает меню для редактирования веток
      toolBar: true,
      nodeMenu: true,
    });

    mind.init();

    // Функция для сворачивания всех узлов при запуске
    // В Mind-elixir управление отображением происходит через данные

    // Интеграция с Telegram Web Apps
    const tg = window.Telegram.WebApp;
    tg.expand();

    function saveData() {
      const fullData = mind.getAllData();
      // Отправляем данные обратно в бота
      tg.sendData(JSON.stringify(fullData));
    }
  </script>
</body>
</html>
