<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mind Map</title>

  <!-- Используем стабильную версию с проверенного CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mind-elixir@0.18.1/dist/style.css">
  <script src="https://cdn.jsdelivr.net/npm/mind-elixir@0.18.1/dist/mind-elixir.js"></script>

  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #f0f0f0; }
    /* Важно: четко задаем размеры контейнера */
    #map {
        width: 100vw;
        height: 85vh;
        display: block;
        background: #ffffff;
    }
    .bottom-bar {
        height: 15vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
        background: #fff;
        border-top: 2px solid #0088cc;
    }
    button {
        padding: 12px 30px;
        background: #0088cc;
        color: white;
        border: none;
        border-radius: 20px;
        font-size: 16px;
        cursor: pointer;
    }
    .info { font-size: 10px; color: #666; }
  </style>
</head>
<body>

  <div id="map"></div>

  <div class="bottom-bar">
    <button onclick="saveData()">СОХРАНИТЬ</button>
    <div class="info">Инструкция: Долгий тап на узле — меню | Двойной тап — текст</div>
  </div>

  <script>
    try {
      // 1. Создаем объект данных строго по документации
      const mapData = {
        nodeData: {
          id: 'root_node',
          topic: 'Главная тема',
          root: true,
          children: [
            { id: 'child1', topic: 'Ветка 1 (нажми)', children: [] },
            { id: 'child2', topic: 'Ветка 2', children: [] }
          ]
        }
      };

      // 2. Настраиваем опции
      const options = {
        el: '#map',
        direction: 1, // MindElixir.SIDE = 1
        data: mapData,
        draggable: true,
        contextMenu: true,
        toolBar: true,
        nodeMenu: true,
        keypress: true
      };

      // 3. Инициализация
      const mind = new MindElixir(options);
      mind.init();

      // Центрируем карту
      setTimeout(() => {
          mind.getAllData(); // Проверка работоспособности
      }, 500);

    } catch (e) {
      // Если что-то пошло не так, мы увидим ошибку на экране телефона
      document.getElementById('map').innerHTML = '<p style="color:red; padding: 20px;">Ошибка загрузки карты: ' + e.message + '</p>';
    }

    // Интеграция с Telegram
    const tg = window.Telegram.WebApp;
    if (tg) {
        tg.expand();
        tg.ready();
    }

    function saveData() {
      const result = mind.getAllData();
      if (tg && tg.sendData) {
          tg.sendData(JSON.stringify(result));
      } else {
          console.log("Результат:", result);
          alert("Данные выведены в консоль (вне Telegram)");
      }
    }
  </script>
</body>
</html>
