<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Попутчик Таджикистан</title>
    <!-- Tailwind CSS: делает кнопки и поля красивыми и современными -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Скрипт Telegram: чтобы сайт понимал, кто его открыл внутри Телеграма -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased pb-10">

    <!-- Шапка приложения -->
    <div class="bg-blue-600 text-white p-4 shadow-md text-center rounded-b-xl">
        <h1 class="text-xl font-bold">🚗 Попутчик Таджикистан</h1>
        <p id="welcome-user" class="text-sm mt-1 opacity-90">Загрузка профиля...</p>
    </div>

    <!-- Переключатель вкладок (Пассажир / Водитель) -->
    <div class="flex justify-center my-4 px-4 gap-2">
        <button id="tab-search" onclick="switchTab('search')" class="flex-1 py-2 bg-blue-600 text-white rounded-lg font-medium shadow">Найти поездку</button>
        <button id="tab-create" onclick="switchTab('create')" class="flex-1 py-2 bg-white text-gray-700 rounded-lg font-medium shadow border border-gray-200">Создать поездку</button>
    </div>

    <!-- ЭКРАН 1: ПОИСК ПОЕЗДОК (ДЛЯ ПАССАЖИРА) -->
    <div id="screen-search" class="px-4 space-y-4">
        <div class="bg-white p-4 rounded-xl shadow border border-gray-100 space-y-3">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase">Откуда</label>
                <select id="search-from" class="w-full mt-1 p-2 bg-gray-50 border border-gray-200 rounded-lg">
                    <option value="Душанбе">Душанбе</option>
                    <option value="Худжанд">Худжанд</option>
                    <option value="Бохтар">Бохтар</option>
                    <option value="Куляб">Куляб</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase">Куда</label>
                <select id="search-to" class="w-full mt-1 p-2 bg-gray-50 border border-gray-200 rounded-lg">
                    <option value="Худжанд">Худжанд</option>
                    <option value="Душанбе">Душанбе</option>
                    <option value="Бохтар">Бохтар</option>
                    <option value="Куляб">Куляб</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase">Дата выезда</label>
                <input type="date" id="search-date" class="w-full mt-1 p-2 bg-gray-50 border border-gray-200 rounded-lg">
            </div>
            <button onclick="performSearch()" class="w-full py-3 bg-blue-600 text-white rounded-lg font-bold shadow hover:bg-blue-700">Найти машину</button>
        </div>

        <!-- Сюда будут выводиться найденные из базы машины -->
        <div id="search-results" class="space-y-3">
            <p class="text-center text-gray-400 text-sm py-4">Укажите маршрут и нажмите поиск</p>
        </div>
    </div>

    <!-- ЭКРАН 2: СОЗДАНИЕ ПОЕЗДКИ (ДЛЯ ВОДИТЕЛЯ) -->
    <div id="screen-create" class="px-4 space-y-4 hidden">
        <div class="bg-white p-4 rounded-xl shadow border border-gray-100 space-y-3">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase">Откуда</label>
                <select id="create-from" class="w-full mt-1 p-2 bg-gray-50 border border-gray-200 rounded-lg"><option value="Душанбе">Душанбе</option><option value="Худжанд">Худжанд</option></select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase">Куда</label>
                <select id="create-to" class="w-full mt-1 p-2 bg-gray-50 border border-gray-200 rounded-lg"><option value="Худжанд">Худжанд</option><option value="Душанбе">Душанбе</option></select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase">Дата и время выезда</label>
                <input type="datetime-local" id="create-datetime" class="w-full mt-1 p-2 bg-gray-50 border border-gray-200 rounded-lg">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase">Всего мест</label>
                    <input type="number" id="create-seats" value="4" class="w-full mt-1 p-2 bg-gray-50 border border-gray-200 rounded-lg">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase">Цена (сомони)</label>
                    <input type="number" id="create-price" placeholder="120" class="w-full mt-1 p-2 bg-gray-50 border border-gray-200 rounded-lg">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase">Комментарий</label>
                <input type="text" id="create-comment" placeholder="Машина Kia K5, выезжаю с Водоканала" class="w-full mt-1 p-2 bg-gray-50 border border-gray-200 rounded-lg">
            </div>
            <button onclick="submitTrip()" class="w-full py-3 bg-green-600 text-white rounded-lg font-bold shadow hover:bg-green-700">Опубликовать поездку</button>
        </div>
    </div>

    <!-- ЛОГИКА НА JAVASCRIPT ДЛЯ СВЯЗИ С БЭКЕНДОМ -->
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть окно на весь экран телефона

        // Если открываем на компьютере (вне Telegram), используем тестового пользователя 11111
        const user = tg.initDataUnsafe?.user || { id: 11111, first_name: "Тестовый Водитель" };
        document.getElementById('welcome-user').innerText = `Салом, ${user.first_name}!`;

        // Адрес нашего запущенного бэкенда FastAPI
        const BACKEND_URL = "https://telegabot-77m2.onrender.com";

        // Ставим сегодняшнюю дату в календарь по умолчанию
        document.getElementById('search-date').valueAsDate = new Date();

        // Функция переключения вкладок Пассажир/Водитель
        function switchTab(tab) {
            const searchScreen = document.getElementById('screen-search');
            const createScreen = document.getElementById('screen-create');
            const btnSearch = document.getElementById('tab-search');
            const btnCreate = document.getElementById('tab-create');

            if (tab === 'search') {
                searchScreen.classList.remove('hidden');
                createScreen.classList.add('hidden');
                btnSearch.className = "flex-1 py-2 bg-blue-600 text-white rounded-lg font-medium shadow";
                btnCreate.className = "flex-1 py-2 bg-white text-gray-700 rounded-lg font-medium shadow border border-gray-200";
            } else {
                searchScreen.classList.add('hidden');
                createScreen.classList.remove('hidden');
                btnSearch.className = "flex-1 py-2 bg-white text-gray-700 rounded-lg font-medium shadow border border-gray-200";
                btnCreate.className = "flex-1 py-2 bg-green-600 text-white rounded-lg font-medium shadow";
            }
        }

        // 1. ОТПРАВКА ЗАПРОСА НА ПОИСК ПОЕЗДОК
        async function performSearch() {
            const from = document.getElementById('search-from').value;
            const to = document.getElementById('search-to').value;
            const date = document.getElementById('search-date').value;
            const resultsDiv = document.getElementById('search-results');
            
            resultsDiv.innerHTML = '<p class="text-center text-gray-400 text-sm">Ищем машины...</p>';
        
            try {
                const response = await fetch(`${BACKEND_URL}/trips/search/?from_city=${from}&to_city=${to}&travel_date=${date}`);
                const trips = await response.json();
        
                if (trips.length === 0) {
                    resultsDiv.innerHTML = '<p class="text-center text-gray-500 font-medium py-4 bg-white rounded-xl shadow">На этот день поездок нет 😔</p>';
                    return;
                }
        
                resultsDiv.innerHTML = '';
                trips.forEach(trip => {
                    const time = new Date(trip.departure_time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    // Проверяем: если мест 0, кнопку бронирования блокируем
                    const isFull = trip.available_seats <= 0;
                    const btnText = isFull ? "Мест нет" : "Бронь";
                    const btnClass = isFull 
                        ? "mt-2 px-3 py-1 bg-gray-200 text-gray-400 font-bold rounded-lg text-xs cursor-not-allowed"
                        : "mt-2 px-3 py-1 bg-blue-100 text-blue-700 font-bold rounded-lg text-xs hover:bg-blue-200";
        
                    resultsDiv.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow border border-gray-100 flex justify-between items-center">
                            <div>
                                <div class="text-lg font-bold text-gray-800">${time} • ${trip.from_city} → ${trip.to_city}</div>
                                <div class="text-xs text-green-600 font-semibold mt-1">🚘 Машина/Заметка: ${trip.comment || 'не указана'}</div>
                            </div>
                            <div class="text-right">
                                <div class="text-xl font-extrabold text-blue-600">${trip.price_per_seat} TJS</div>
                                <div class="text-xs text-gray-400 mt-1">Свободно мест: <span class="font-bold text-gray-700">${trip.available_seats}</span>/${trip.total_seats}</div>
                                <button 
                                    onclick="sendBookingRequest(${trip.id})" 
                                    ${isFull ? 'disabled' : ''} 
                                    class="${btnClass}">
                                    ${btnText}
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                resultsDiv.innerHTML = '<p class="text-center text-red-500 text-sm">Ошибка связи с бэкендом</p>';
            }
        }

        // А ТЕПЕРЬ ДОБАВЬ НИЖЕ СОВЕРШЕННО НОВУЮ ФУНКЦИЮ ОТПРАВКИ БРОНИ:
        async function sendBookingRequest(tripId) {
            try {
                const payload = {
                    trip_id: parseInt(tripId),
                    passenger_id: parseInt(user.id) // Передаем Telegram ID пассажира
                };
        
                const response = await fetch(`${BACKEND_URL}/bookings/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
        
                if (response.ok) {
                    // Красивое всплывающее окно самого Телеграма (или обычный alert, если тест в браузере)
                    if (window.Telegram?.WebApp?.showAlert) {
                        tg.showAlert("⏳ Заявка отправлена водителю! Ожидайте уведомления в чате бота.");
                    } else {
                        alert("⏳ Заявка отправлена водителю! Ожидайте уведомления в чате бота.");
                    }
                } else {
                    const errorData = await response.json();
                    alert(`Ошибка: ${errorData.detail || "Не удалось забронировать"}`);
                }
            } catch (e) {
                alert("Не удалось отправить запрос на бронирование.");
            }
        }

        // 2. ОТПРАВКА ДАННЫХ О НОВОЙ ПОЕЗДКЕ НА БЭКЕНД
        async function submitTrip() {
            const from = document.getElementById('create-from').value;
            const to = document.getElementById('create-to').value;
            const datetime = document.getElementById('create-datetime').value;
            const seats = document.getElementById('create-seats').value;
            const price = document.getElementById('create-price').value;
            const comment = document.getElementById('create-comment').value;

            if (!datetime || !price) {
                alert("Пожалуйста, заполните время выезда и цену!");
                return;
            }

            const payload = {
                from_city: from,
                to_city: to,
                departure_time: new Date(datetime).toISOString(),
                total_seats: parseInt(seats),
                price_per_seat: parseInt(price),
                comment: comment
            };

            try {
                // Передаем driver_id нашего тестового пользователя (11111)
                const response = await fetch(`${BACKEND_URL}/trips/?driver_id=${user.id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("Отлично! Поездка успешно добавлена в базу.");
                    switchTab('search'); // Переключаем пользователя на экран поиска
                    performSearch();     // Сразу обновляем список
                } else {
                    alert("Ошибка сервера. Убедитесь, что пользователь с ID 11111 создан в базе через Swagger.");
                }
            } catch (e) {
                alert("Не удалось связаться с сервером.");
            }
        }
    </script>
</body>
</html>
